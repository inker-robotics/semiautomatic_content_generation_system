name: newsletter-scheduler

on:
  schedule:
    # Runs daily at 04:30 UTC (which is exactly 10:00 AM IST)
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  trigger-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled newsletter generation
        run: |
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/api/generate/scheduled" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
