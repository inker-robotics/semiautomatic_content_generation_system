<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inker AI Agents | Client Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1), transparent 25%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-8">

<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">AI Agent Dashboard</h1>
            <p class="text-slate-400 mt-2">Manage your scheduled WhatsApp news agents.</p>
        </div>
    </div>

    <!-- Agent List -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="agent-list">
        <!-- Cards injected via JS -->
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="glass-card rounded-2xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white">Configure Agent</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white">&times;</button>
            </div>
            
            <form id="agent-form" class="space-y-4">
                <input type="hidden" id="agent-day-id">
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Edition Title</label>
                    <input type="text" id="edition-title" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Delivery Time (HH:MM)</label>
                        <input type="time" id="target-time" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">WhatsApp Number (Optional)</label>
                        <input type="text" id="target-phone" placeholder="e.g. +1234567890" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500">
                        <p class="text-xs text-slate-500 mt-1">Include country code. Leaves empty to use default.</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Target Audiences</label>
                    <div id="audiences-container" class="flex flex-wrap gap-2 mb-2"></div>
                    <div class="flex gap-2">
                        <input type="text" id="new-audience" placeholder="e.g. Alumni, Researchers..." class="flex-1 bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500">
                        <button type="button" onclick="addAudience()" class="px-4 py-2 rounded-lg font-medium bg-slate-700 text-white hover:bg-slate-600 transition">Add</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Scout System Prompt</label>
                    <textarea id="scout-prompt" rows="3" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Writer System Prompt</label>
                    <textarea id="writer-prompt" rows="3" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-sky-500"></textarea>
                </div>

                <div class="flex items-center gap-3">
                    <input type="checkbox" id="is-active" class="w-5 h-5 rounded border-slate-700 bg-slate-800/50 text-sky-500 focus:ring-sky-500 focus:ring-offset-slate-900">
                    <label class="text-sm font-medium text-slate-300">Agent Active</label>
                </div>

                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-5 py-2 rounded-lg font-medium bg-slate-800 text-white hover:bg-slate-700 transition">Cancel</button>
                    <button type="submit" class="px-5 py-2 rounded-lg font-medium bg-sky-600 text-white hover:bg-sky-500 transition shadow-[0_0_15px_rgba(14,165,233,0.4)]">Save Agent</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let currentAgents = [];
    let currentAudiences = [];

    async function loadAgents() {
        try {
            const res = await fetch('/api/agents');
            currentAgents = await res.json();
            renderAgents();
        } catch (e) {
            console.error('Failed to load agents', e);
        }
    }

    function renderAgents() {
        const container = document.getElementById('agent-list');
        container.innerHTML = '';
        
        currentAgents.forEach(agent => {
            const statusColor = agent.is_active ? 'bg-emerald-500' : 'bg-slate-600';
            const statusText = agent.is_active ? 'Active' : 'Paused';
            
            const card = document.createElement('div');
            card.className = 'glass-card rounded-2xl p-6 hover:border-sky-500/50 transition duration-300 group';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-semibold text-slate-300 flex items-center gap-2 shadow-inner">
                        <div class="w-2 h-2 rounded-full ${statusColor}"></div>
                        ${agent.day_name}
                    </div>
                    <button onclick="openModal(${agent.publish_weekday})" class="text-slate-400 hover:text-sky-400 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">${agent.edition_title}</h3>
                <div class="space-y-2 mt-4 text-sm text-slate-400">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        ${agent.target_time}
                    </div>
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        ${agent.target_phone_number || 'Default Number'}
                    </div>
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        ${agent.target_audiences ? agent.target_audiences.length : 2} Audiences
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openModal(weekday) {
        const agent = currentAgents.find(a => a.publish_weekday === weekday);
        if (!agent) return;

        document.getElementById('agent-day-id').value = agent.publish_weekday;
        
        currentAudiences = [...(agent.target_audiences || ["student", "faculty"])];
        renderAudiences();
        document.getElementById('edition-title').value = agent.edition_title;
        document.getElementById('target-time').value = agent.target_time;
        document.getElementById('target-phone').value = agent.target_phone_number || '';
        document.getElementById('scout-prompt').value = agent.scout_system_prompt;
        document.getElementById('writer-prompt').value = agent.writer_system_prompt;
        document.getElementById('is-active').checked = agent.is_active;
        
        document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.add('hidden');
    }

    function renderAudiences() {
        const container = document.getElementById('audiences-container');
        container.innerHTML = '';
        currentAudiences.forEach((aud, idx) => {
            const badge = document.createElement('div');
            badge.className = 'px-3 py-1 bg-sky-900/50 border border-sky-700 text-sky-300 rounded-full text-sm flex items-center gap-2';
            badge.innerHTML = `
                ${aud}
                <button type="button" onclick="removeAudience(${idx})" class="text-sky-500 hover:text-sky-300">&times;</button>
            `;
            container.appendChild(badge);
        });
    }

    function addAudience() {
        const input = document.getElementById('new-audience');
        const val = input.value.trim().toLowerCase();
        if (val && !currentAudiences.includes(val)) {
            currentAudiences.push(val);
            input.value = '';
            renderAudiences();
        }
    }

    function removeAudience(idx) {
        currentAudiences.splice(idx, 1);
        renderAudiences();
    }

    document.getElementById('agent-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const weekday = document.getElementById('agent-day-id').value;
        const agent = currentAgents.find(a => a.publish_weekday == weekday);
        
        const payload = {
            edition_title: document.getElementById('edition-title').value,
            target_time: document.getElementById('target-time').value,
            target_phone_number: document.getElementById('target-phone').value || null,
            target_audiences: currentAudiences,
            scout_system_prompt: document.getElementById('scout-prompt').value,
            writer_system_prompt: document.getElementById('writer-prompt').value,
            is_active: document.getElementById('is-active').checked,
            rss_feeds: agent.rss_feeds // keep existing feeds
        };

        try {
            const res = await fetch(`/api/agents/${weekday}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                closeModal();
                loadAgents();
            } else {
                alert("Error saving agent config");
            }
        } catch (e) {
            console.error(e);
        }
    });

    loadAgents();
</script>
</body>
</html>
