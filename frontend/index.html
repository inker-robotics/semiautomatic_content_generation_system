<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS AI Newsletter Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: { primary: '#6366f1', dark: '#0f172a', panel: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }
</style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass-panel border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-bold">N</div>
                    <span class="font-display font-bold text-xl tracking-tight">NewsAgent SaaS</span>
                </div>
                <div id="navUser" class="hidden flex items-center gap-4">
                    <span id="userEmailDisplay" class="text-sm text-gray-400"></span>
                    <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300 font-medium">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col pt-8 w-full relative">
        
        <!-- --- AUTHENTICATION VIEW --- -->
        <div id="authView" class="flex-grow flex items-center justify-center hidden px-4">
            <div class="glass-panel p-8 rounded-2xl w-full max-w-md shadow-2xl">
                <h2 class="text-3xl font-bold mb-2 text-center" id="authTitle">Welcome Back</h2>
                <p class="text-gray-400 text-center mb-6" id="authSubtitle">Log in to manage your AI agents.</p>
                
                <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                        <input type="email" id="authEmail" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                        <input type="password" id="authPassword" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <button type="submit" class="w-full bg-primary hover:bg-indigo-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-500/30 transition-all mt-4">
                        <span id="authBtnText">Sign In</span>
                    </button>
                </form>
                <div class="mt-6 text-center text-sm text-gray-400">
                    <span id="authToggleText">Don't have an account?</span> 
                    <button onclick="toggleAuthMode()" class="text-primary hover:underline ml-1 font-medium" id="authToggleBtn">Sign Up</button>
                </div>
            </div>
        </div>


                <!-- --- DASHBOARD VIEW --- -->
        <div id="dashboardView" class="hidden w-full flex flex-col items-center py-10 flex-grow px-4">
            <div class="w-full max-w-4xl mb-6 text-center">
                <h1 class="text-4xl md:text-5xl font-black mb-2 tracking-tight">Daily Auto-Pilot</h1>
                <p class="text-indigo-300 font-medium text-lg" id="statusSubtitle">Loading status...</p>
                <p class="text-gray-500 text-sm mt-1">Select a day to configure its specific newsletter settings.</p>
            </div>

            <!-- Tab Navigation -->
            <div class="w-full max-w-4xl flex overflow-x-auto gap-2 mb-6 p-2 bg-slate-900/50 rounded-xl no-scrollbar border border-slate-700/50" id="tabsContainer">
                <!-- Populated via JS -->
            </div>

            <!-- Main Content Grid -->
            <div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Config Card (Takes up 2 columns on large screens) -->
                <div id="singleCardContainer" class="lg:col-span-2 flex flex-col">
                    <!-- Populated via JS -->
                </div>

                <!-- Recent Posters History -->
                <div class="lg:col-span-1 glass-panel rounded-[2rem] p-6 shadow-2xl border-t border-slate-700/50 bg-slate-900/80 flex flex-col">
                    <h3 class="text-xl font-bold mb-4 font-display flex items-center gap-2"><span class="text-2xl">??</span> Recent Posters</h3>
                    <div id="historyContainer" class="space-y-4 overflow-y-auto max-h-[600px] pr-2 custom-scrollbar">
                        <p class="text-sm text-gray-500">Select a day to view history...</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('saas_token');
        let isLoginMode = true;
        let userAgents = [];
        
        const weekdays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

        // Initialization
        if(token) {
            showDashboard();
        } else {
            showAuth();
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Welcome Back' : 'Create Account';
            document.getElementById('authSubtitle').innerText = isLoginMode ? 'Log in to manage your AI agents.' : 'Join the SaaS AI Newsletter platform.';
            document.getElementById('authBtnText').innerText = isLoginMode ? 'Sign In' : 'Sign Up';
            document.getElementById('authToggleText').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('authToggleBtn').innerText = isLoginMode ? 'Sign Up' : 'Log In';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
            
            const btn = document.getElementById('authBtnText');
            const originalText = btn.innerText;
            btn.innerText = 'Processing...';

            try {
                let reqInit = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                };

                if(isLoginMode) {
                    reqInit.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
                    reqInit.body = new URLSearchParams({ username: email, password: password });
                }

                const res = await fetch(API_BASE + endpoint, reqInit);
                const data = await res.json();
                
                if(!res.ok) throw new Error(data.detail || 'Authentication failed');
                
                token = data.access_token;
                localStorage.setItem('saas_token', token);
                showDashboard();
            } catch(err) {
                alert(err.message);
            } finally {
                btn.innerText = originalText;
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('saas_token');
            showAuth();
        }

        function showAuth() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('navUser').classList.add('hidden');
        }

        async function showDashboard() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('navUser').classList.remove('hidden');
            
            try {
                const res = await fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token }});
                if(!res.ok) throw new Error('Session expired');
                const user = await res.json();
                document.getElementById('userEmailDisplay').innerText = user.email;
                loadAgents();
            } catch {
                logout();
            }
        }

        
        let currentTabIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

        async function loadAgents() {
            try {
                const res = await fetch(API_BASE + '/agents', { headers: { 'Authorization': 'Bearer ' + token }});
                if(!res.ok) throw new Error("Failed to load agents");
                userAgents = await res.json();
                renderTabs();
                renderDayView(currentTabIdx);
                loadExecutions(currentTabIdx);
            } catch (e) {
                console.error(e);
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            
            const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
            document.getElementById('statusSubtitle').innerHTML = `Today is <strong class="text-white">${weekdays[todayIdx]}</strong>. Select any day below to configure.`;
            
            weekdays.forEach((day, idx) => {
                const isActiveTab = (idx === currentTabIdx);
                const agent = userAgents.find(a => a.publish_weekday === idx && a.is_active);
                
                const btn = document.createElement('button');
                btn.className = `flex-1 py-2 px-4 rounded-lg font-bold text-sm transition-all whitespace-nowrap shadow-sm ${isActiveTab ? 'bg-indigo-600 text-white shadow-indigo-500/50' : 'bg-slate-800 text-gray-400 hover:bg-slate-700 hover:text-white'}`;
                
                btn.innerHTML = `
                    <div class="flex items-center justify-center gap-2">
                        <span>${day.substring(0, 3)}</span>
                        ${agent ? '<div class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.8)]"></div>' : ''}
                    </div>
                `;
                btn.onclick = () => {
                    currentTabIdx = idx;
                    renderTabs();
                    renderDayView(idx);
                    loadExecutions(idx);
                };
                container.appendChild(btn);
            });
        }

        function renderDayView(idx) {
            const container = document.getElementById('singleCardContainer');
            container.innerHTML = '';
            
            let agent = userAgents.find(a => a.publish_weekday === idx);
            const isConfigured = agent && agent.is_active;
            
            const title = agent ? agent.edition_title : '';
            const time = agent ? agent.target_time : '09:00';
            const phone = agent && agent.target_phone_number ? agent.target_phone_number : '';
            const auds = agent ? agent.target_audiences.join(', ') : 'student, faculty';
            const rss = agent ? agent.rss_feeds.join('\n') : '';
            const scout = agent ? agent.scout_system_prompt : '';
            const writer = agent ? agent.writer_system_prompt : '';

            const card = document.createElement('div');
            card.className = "w-full glass-panel rounded-[2rem] flex flex-col shadow-2xl overflow-hidden border-t border-slate-700/50 bg-slate-900/80 h-full";
            
            card.innerHTML = `
                <!-- Header -->
                <div class="px-6 py-5 border-b border-slate-800 flex justify-between items-center bg-slate-900">
                    <h2 class="text-2xl font-black font-display tracking-tight flex items-center gap-2">
                        ${weekdays[idx]} Settings
                        ${!isConfigured ? '<span class="text-xs bg-slate-700 text-gray-300 px-2 py-1 rounded-md font-bold uppercase tracking-wider ml-2">Inactive</span>' : '<span class="text-xs bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-1 rounded-md font-bold uppercase tracking-wider ml-2 shadow-[0_0_10px_rgba(74,222,128,0.2)]">Active</span>'}
                    </h2>
                    ${isConfigured ? `<button type="button" onclick="testGenerate(${idx})" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg shadow-indigo-500/30 transition-all flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Test Now</button>` : ''}
                </div>

                <!-- Body / Form -->
                <div class="p-6 flex-grow overflow-y-auto no-scrollbar space-y-6">
                    
                    <!-- Magic Auto Pilot -->
                    <div class="bg-gradient-to-br from-indigo-900/40 to-purple-900/40 border border-indigo-500/30 p-5 rounded-2xl">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xl">🪄</span>
                            <h3 class="font-bold text-indigo-300">Magic Auto-Fill</h3>
                        </div>
                        <p class="text-xs text-indigo-200/70 mb-3">Describe the topic. AI will auto-write professional prompts and find 3-5 reputable RSS feeds for you instantly.</p>
                        <div class="flex gap-2">
                            <input type="text" id="magicDesc" class="flex-grow bg-slate-950/50 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-indigo-500 focus:outline-none placeholder-gray-500" placeholder="e.g., Tech & Robotics News">
                            <button type="button" onclick="runMagic()" id="magicBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-md transition-all whitespace-nowrap">Auto-Fill</button>
                        </div>
                    </div>

                    <form id="dayForm" class="space-y-5">
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Edition Title</label>
                                <input type="text" id="title" value="${title}" required placeholder="e.g. Inker Tech Brief" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary focus:outline-none transition-all">
                            </div>

                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Send Time (Daily)</label>
                                    <input type="time" id="time" value="${time}" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary focus:outline-none transition-all">
                                </div>
                                <div class="flex-1">
                                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">WhatsApp #</label>
                                    <input type="text" id="phone" value="${phone}" placeholder="+1234567890" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary focus:outline-none transition-all">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Target Audiences</label>
                                <input type="text" id="auds" value="${auds}" required placeholder="e.g. students, faculty" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-primary focus:outline-none transition-all text-sm">
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 flex justify-between">
                                    <span>RSS Feeds</span>
                                    <span class="text-[10px] text-gray-500 normal-case font-normal">(One URL per line)</span>
                                </label>
                                <textarea id="rss" rows="3" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-xs text-blue-300 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="https://rss.feed.url/">${rss}</textarea>
                            </div>
                        </div>

                        <!-- Prompts Section -->
                        <div class="mt-4 p-4 rounded-2xl bg-slate-950/40 border border-slate-800 space-y-4">
                            <h4 class="text-sm font-bold text-gray-300 mb-2">Agent Instructions</h4>
                            
                            <div>
                                <label class="block text-[10px] font-bold text-purple-400 uppercase mb-1">Scout Prompt</label>
                                <textarea id="scout" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-gray-300 focus:ring-1 focus:ring-purple-500 focus:outline-none" required>${scout}</textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-green-400 uppercase mb-1">Writer Prompt</label>
                                <textarea id="writer" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-gray-300 focus:ring-1 focus:ring-green-500 focus:outline-none" required>${writer}</textarea>
                            </div>
                        </div>

                        <!-- Footer Actions -->
                        <div class="pt-2 flex gap-3 flex-col sm:flex-row">
                            <button type="button" onclick="saveDayAgent(${idx}, event)" id="saveDayBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white py-3 rounded-xl font-bold shadow-lg transition-all active:scale-[0.98]">
                                Save for ${weekdays[idx]}
                            </button>
                            <button type="button" onclick="saveGlobalAgent(event)" id="saveGlobalBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-500/30 transition-all active:scale-[0.98]">
                                Apply to All Days
                            </button>
                        </div>
                        ${isConfigured ? `<div class="text-center mt-2"><button type="button" onclick="deleteAgent(${agent.id})" class="text-xs text-red-400 hover:text-red-300 underline">Turn off for ${weekdays[idx]}</button></div>` : ''}
                    </form>
                </div>
            `;
            container.appendChild(card);
        }

        async function loadExecutions(idx) {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div class="text-center py-4"><span class="animate-pulse text-indigo-400">Loading history...</span></div>';
            
            try {
                const res = await fetch(API_BASE + `/executions?weekday=${idx}`, { headers: { 'Authorization': 'Bearer ' + token }});
                if(!res.ok) throw new Error("Failed to load history");
                const executions = await res.json();
                
                if (executions.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-8 opacity-50">
                            <span class="text-4xl mb-2">📭</span>
                            <p class="text-sm text-gray-400">No posters generated for ${weekdays[idx]} yet.</p>
                        </div>`;
                    return;
                }
                
                container.innerHTML = '';
                executions.forEach(exec => {
                    const statusColor = exec.status === 'completed' ? 'text-green-400' : (exec.status === 'error' || exec.status === 'failed' ? 'text-red-400' : 'text-yellow-400');
                    const statusIcon = exec.status === 'completed' ? '✅' : (exec.status === 'error' || exec.status === 'failed' ? '❌' : '⏳');
                    
                    const el = document.createElement('div');
                    el.className = "bg-slate-950/50 border border-slate-800 rounded-xl p-4 flex flex-col gap-2 transition-all hover:bg-slate-800/50";
                    
                    let htmlLink = '';
                    if ((exec.status === 'completed' || exec.status === 'awaiting_review') && exec.newsletter_html) {
                        htmlLink = `
                            <a href="/newsletters/edition_${exec.id}.html" target="_blank" class="mt-2 text-xs bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 py-1.5 px-3 rounded-lg self-start transition-all border border-indigo-500/30 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                View Poster
                            </a>`;
                    }
                    
                    el.innerHTML = `
                        <div class="flex justify-between items-start gap-2">
                            <h4 class="font-bold text-sm text-gray-200 leading-tight">${exec.topic}</h4>
                            <span title="${exec.status}" class="text-xs ${statusColor} whitespace-nowrap">${statusIcon}</span>
                        </div>
                        <div class="text-[10px] text-gray-500 font-mono">
                            ${new Date(exec.created_at + 'Z').toLocaleString()}
                        </div>
                        ${htmlLink}
                    `;
                    container.appendChild(el);
                });
                
            } catch (e) {
                container.innerHTML = `<p class="text-xs text-red-400">Error loading history: ${e.message}</p>`;
            }
        }

        async function runMagic() {
            const descInput = document.getElementById('magicDesc');
            const desc = descInput.value.trim();
            if(!desc) {
                alert("Please type a topic first! (e.g. 'Robotics News')");
                descInput.focus();
                return;
            }
            
            const btn = document.getElementById('magicBtn');
            btn.innerHTML = `<span class="animate-pulse">Thinking...</span>`;
            btn.disabled = true;
            
            try {
                const res = await fetch(API_BASE + '/agents/auto_prompt', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc })
                });
                
                if(!res.ok) throw new Error("Failed to generate.");
                
                const data = await res.json();
                
                document.getElementById('scout').value = data.scout_system_prompt || '';
                document.getElementById('writer').value = data.writer_system_prompt || '';
                
                if (data.rss_feeds && Array.isArray(data.rss_feeds)) {
                    document.getElementById('rss').value = data.rss_feeds.join('\n');
                }
                
                const titleEl = document.getElementById('title');
                if(!titleEl.value) {
                    titleEl.value = desc.charAt(0).toUpperCase() + desc.slice(1) + " Brief";
                }

                const phoneEl = document.getElementById('phone');
                if(!phoneEl.value) {
                    phoneEl.value = "+919495614755";
                }

                alert("Magic Complete! Prompts and RSS feeds have been auto-filled. Please review them and click Save.");
            } catch(e) {
                alert(e.message);
            } finally {
                btn.innerHTML = `Auto-Fill`;
                btn.disabled = false;
            }
        }

        function getPayload(idx) {
            return {
                publish_weekday: idx,
                day_name: weekdays[idx],
                edition_title: document.getElementById('title').value,
                scout_system_prompt: document.getElementById('scout').value,
                writer_system_prompt: document.getElementById('writer').value,
                rss_feeds: document.getElementById('rss').value.split('\n').map(l=>l.trim()).filter(l=>l),
                target_audiences: document.getElementById('auds').value.split(',').map(a=>a.trim()).filter(a=>a),
                target_time: document.getElementById('time').value,
                target_phone_number: document.getElementById('phone').value || null,
                is_active: true
            };
        }

        async function saveDayAgent(idx, e) {
            if(e) e.preventDefault();
            
            if(!document.getElementById('dayForm').checkValidity()) {
                document.getElementById('dayForm').reportValidity();
                return;
            }

            const btn = document.getElementById('saveDayBtn');
            const ogText = btn.innerText;
            btn.innerText = "Saving...";
            
            try {
                const existingAgent = userAgents.find(a => a.publish_weekday === idx);
                const payload = getPayload(idx);
                
                const method = existingAgent ? 'PUT' : 'POST';
                const url = existingAgent ? `/agents/${existingAgent.id}` : `/agents`;
                
                const res = await fetch(API_BASE + url, {
                    method: method,
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(!res.ok) throw new Error(`Failed to save ${weekdays[idx]}`);
                
                await loadAgents();
                alert(`Saved settings for ${weekdays[idx]}!`);
            } catch(err) {
                alert(err.message);
            } finally {
                if(btn) btn.innerText = ogText;
            }
        }

        async function saveGlobalAgent(e) {
            if(e) e.preventDefault();
            
            if(!document.getElementById('dayForm').checkValidity()) {
                document.getElementById('dayForm').reportValidity();
                return;
            }
            
            const btn = document.getElementById('saveGlobalBtn');
            const ogText = btn.innerText;
            btn.innerText = "Applying to all...";
            
            try {
                const promises = weekdays.map(async (dayName, idx) => {
                    const existingAgent = userAgents.find(a => a.publish_weekday === idx);
                    const payload = getPayload(idx);

                    const method = existingAgent ? 'PUT' : 'POST';
                    const url = existingAgent ? `/agents/${existingAgent.id}` : `/agents`;
                    
                    const res = await fetch(API_BASE + url, {
                        method: method,
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if(!res.ok) throw new Error(`Failed to save ${dayName}`);
                });
                
                await Promise.all(promises);
                await loadAgents();
                alert("Successfully applied settings to all 7 days!");
                
            } catch(err) {
                alert(err.message);
            } finally {
                if(btn) btn.innerText = ogText;
            }
        }

        async function deleteAgent(id) {
            if(!confirm("Are you sure you want to delete this agent? It will become 'Unset'.")) return;
            try {
                await fetch(API_BASE + `/agents/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }});
                loadAgents();
            } catch (e) {
                alert(e.message);
            }
        }

        async function testGenerate(weekdayIndex) {
            if(!confirm("Trigger AI to fetch news and send WhatsApp messages for this day right now?")) return;
            
            try {
                const res = await fetch(API_BASE + '/generate/manual', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ publish_weekday: weekdayIndex })
                });
                if(!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Trigger failed");
                }
                alert("🚀 The AI pipeline has been started! The poster will arrive in WhatsApp shortly.");
            } catch(e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
